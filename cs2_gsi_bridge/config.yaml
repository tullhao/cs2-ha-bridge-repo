name: "CS2 GSI Bridge"
version: "0.1.1"
slug: "cs2_gsi_bridge"
description: "Receives Counter-Strike 2 Game State Integration posts and publishes MQTT topics + Home Assistant discovery entities."
url: "https://github.com/YOUR_GITHUB_USERNAME/cs2-ha-bridge-repo"
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: application
boot: auto
ports:
  3001/tcp: 3001
options:
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_base_topic: cs2_bridge
  discovery_prefix: homeassistant
  publish_discovery: true
schema:
  mqtt_host: str
  mqtt_port: int(1,65535)
  mqtt_username: str?
  mqtt_password: password?
  mqtt_base_topic: str
  discovery_prefix: str
  publish_discovery: bool
